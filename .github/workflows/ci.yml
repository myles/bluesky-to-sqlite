name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - id: checkout
        name: "Checkout 🛎"
        uses: actions/checkout@v4

      - id: setup-python
        name: "Setup Python ${{ matrix.python-version }} 🏗"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - id: setup-uv
        name: "Install uv ☀️"
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - id: install-dependencies
        name: "Install dependencies 👨🏻‍💻"
        run: make setup

      - id: uv-lock
        name: "Run uv lock 📌"
        run: uv lock --check

      - id: run-test
        name: "Run tests 🧪"
        run: make test

      - id: run-linters
        name: "Run linters 🚨"
        run: make lint
